<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0D1117"/>
  <!-- Ask levels (red) -->
  <rect x="6" y="6" width="10" height="3" rx="1" fill="#EF4444"/>
  <rect x="6" y="10" width="14" height="3" rx="1" fill="#EF4444" opacity="0.8"/>
  <!-- Spread line -->
  <line x1="6" y1="16" x2="26" y2="16" stroke="#6B7280" stroke-width="1" stroke-dasharray="2"/>
  <!-- Bid levels (green) -->
  <rect x="6" y="19" width="16" height="3" rx="1" fill="#4ADE80" opacity="0.8"/>
  <rect x="6" y="23" width="12" height="3" rx="1" fill="#4ADE80"/>
</svg>
